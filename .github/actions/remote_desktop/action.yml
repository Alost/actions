name: "Remote Desktop"
description: "remote desktop"
runs:
  using: "composite"
  steps:
    - name: Remote Desktop
      shell: bash
      run: |
        set -euxo pipefail
        cd ${{ github.action_path }}

        chmod +x ./macos_vnc.sh
        ./macos_vnc.sh

    - name: wait for continue file to exit
      shell: bash
      run: |
        while [ ! -f ./continue ]; do
          sleep 5
        done
