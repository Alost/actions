name: "Remote Desktop"
description: "remote desktop"
runs:
  using: "composite"
  steps:
    - name: Remote Desktop
      shell: bash
      run: |
        set -euxo pipefail
        cd ${{ github.action_path }}

        chmod +x ./macos_vnc.sh
        ./macos_vnc.sh

    - name: Keep Session Alive
      shell: bash
      run: |
        while true; do
          sleep 60
          echo $(pwd)
        done
