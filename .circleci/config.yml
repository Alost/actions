# https://circleci.com/docs/testing-ios/
# https://circleci.com/docs/using-macos/
# https://circleci.com/docs/guides/execution-managed/executor-intro/
# https://circleci.com/docs/guides/execution-managed/using-macos/#supported-xcode-versions

# https://circleci.com/docs/reference/configuration-reference/
# https://circleci.com/developer/orbs
# https://circleci.com/docs/guides/optimize/caching/
# https://circleci.com/docs/guides/orchestrate/workspaces/
# https://circleci.com/pricing/price-list/

# https://app.circleci.com/organization/github/Alost
# 每月6000min 3w积分 单次最长1h 2G存储
# 缓存key只能写一次的

version: 2.1

executors:
  macos:
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium # 6C28G74G 200积分/min 每月150min
    # resource_class: m4pro.large # 12C56G 400积分/min free不支持
    environment:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      TZ: Asia/Shanghai

jobs:
  build:
    executor: macos
    steps:
      - checkout
      - run:
          name: init
          command: |
            circleci-agent version
            sw_vers
            uname -a
            sysctl -n machdep.cpu.brand_string || true
            system_profiler SPHardwareDataType || true
            df -h
            sysctl -n hw.ncpu
            sysctl -n hw.physicalcpu
            sysctl -n hw.logicalcpu
            sysctl -n hw.memsize
            printenv | sort
            ls -1 /Applications | grep -i Xcode || true
      - run:
          name: build
          command: echo 123

workflows:
  test:
    jobs:
      - build
