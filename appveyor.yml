version: 1.0.{build}

image: macos-sonoma

environment:
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

init:
  - appveyor version
  - sw_vers
  - uname -a
  - sysctl -n machdep.cpu.brand_string || true
  - system_profiler SPHardwareDataType || true
  - df -h
  - sysctl -n hw.ncpu || true
  - sysctl -n hw.physicalcpu || true
  - sysctl -n hw.logicalcpu || true
  - sysctl -n hw.memsize || true
  - diskutil info / || true
  - printenv | sort
build_script:
  - ls -1 /Applications | grep -i Xcode || true
